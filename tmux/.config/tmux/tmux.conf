# ── Prefix ──────────────────────────────────────────────────────────────────
# C-s requires `stty -ixon` in zshrc to disable terminal flow control (XOFF)
set -g prefix C-s
unbind C-b
bind C-s send-prefix

# ── Core ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 0          # no Esc delay (critical for nvim)
set -g history-limit 50000
set -g mouse on
set -g focus-events on         # lets nvim autoread on file change
set -g set-clipboard on

# ── Window / pane numbering ──────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Pane navigation (vim-style) ──────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Splits / new windows ─────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Workflow ──────────────────────────────────────────────────────────────────
bind T run-shell "tterm"
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux reloaded"

# ── Session navigation ───────────────────────────────────────────────────────
bind s choose-tree -sZ
bind ( switch-client -p
bind ) switch-client -n

# ── Copy mode (vi) ───────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Catppuccin Mocha status bar ───────────────────────────────────────────────
# Palette (hex values inlined — no shell variables in tmux.conf)
# Base:#1e1e2e  Surface0:#313244  Surface1:#45475a  Overlay1:#7f849c
# Text:#cdd6f4  Subtext1:#bac2de  Blue:#89b4fa  Mauve:#cba6f7

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style          "fg=#cdd6f4,bg=#1e1e2e"
set -g status-left-length    40
set -g status-right-length   80

# Left: project (session) name in mauve pill
set -g status-left \
  "#[fg=#1e1e2e,bg=#cba6f7,bold]  #S #[fg=#cba6f7,bg=#1e1e2e,nobold]  "

# Right: time / date in surface block, hostname in mauve pill
set -g status-right \
  "#[fg=#45475a,bg=#1e1e2e]#[fg=#bac2de,bg=#45475a] %H:%M  %d %b #[fg=#cba6f7,bg=#45475a]#[fg=#1e1e2e,bg=#cba6f7,bold] #h "

# Window tabs
set -g  status-justify             left
setw -g window-status-separator    ""
setw -g window-status-style        "fg=#6c7086,bg=#1e1e2e"
setw -g window-status-format       "  #I:#W  "
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-current-format \
  "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W #[fg=#89b4fa,bg=#1e1e2e,nobold] "

# Pane borders
set -g pane-border-style        "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# Prompts / messages
set -g message-style         "fg=#cdd6f4,bg=#313244,bold"
set -g message-command-style "fg=#cdd6f4,bg=#313244"
set -g mode-style            "fg=#1e1e2e,bg=#89b4fa"
