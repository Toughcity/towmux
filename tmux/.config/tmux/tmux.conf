# ── Prefix ──────────────────────────────────────────────────────────────────
set -g prefix C-Space
set -g extended-keys on     # understand CSI u sequences (e.g. from claude, TUI apps) for prefix detection
unbind C-b
bind C-Space send-prefix

# ── Core ─────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 0          # no Esc delay (critical for nvim)
set -g history-limit 50000
set -g mouse on
set -g focus-events on         # lets nvim autoread on file change
set -g set-clipboard on

# ── Window / pane numbering ──────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Pane navigation (vim-style) ──────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Splits / new windows ─────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %
unbind Space   # Space is nvim leader — don't let it leak through
bind = next-layout

# ── Workflow ──────────────────────────────────────────────────────────────────
bind T run-shell "tterm"
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux reloaded"
bind P command-prompt -p "pull window:"  "join-pane -s '%%' -h"
bind B command-prompt -p "break to name:" "break-pane -n '%%'"

# Jump to named project windows (prefix + letter)
bind e run-shell "tmux select-window -t '#{session_name}:code' 2>/dev/null || true"
bind i run-shell "tmux select-window -t '#{session_name}:ai'   2>/dev/null || true"
bind o run-shell "tmux select-window -t '#{session_name}:term' 2>/dev/null || true"

# Alt+number — switch windows without needing prefix at all
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5

# ── Session navigation ───────────────────────────────────────────────────────
bind s choose-tree -sZ
bind ( switch-client -p
bind ) switch-client -n

# ── Copy mode (vi) ───────────────────────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send-keys -X begin-selection
bind -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# ── Tokyo Night status bar ────────────────────────────────────────────────────
# Palette (hex values inlined — no shell variables in tmux.conf)
# Base:#1a1b26  Surface:#1f2335  Surface1:#24283b  Comment:#565f89
# Foreground:#c0caf5  Subtext:#a9b1d6  Blue:#7aa2f7  Purple:#bb9af7

# Status bar sits at the TOP so window tabs (most-clicked items) don't
# collide with the macOS dock at the bottom of the screen. A single row
# with a contrasting background (#24283b / Surface1) so the bar stands
# out from the pane content (#1a1b26 / Base) without needing extra rows
# of dividers.
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-style          "fg=#c0caf5,bg=#24283b"
set -g status-left-length    40
set -g status-right-length   100

# Left: session name (purple block)
set -g status-left \
  "#[fg=#1a1b26,bg=#bb9af7,bold]  #S #[fg=#bb9af7,bg=#24283b,nobold]  "

# Right: project root path (tilde-shortened) + git branch (green block)
set -g status-right \
  "#[fg=#a9b1d6,bg=#24283b] #(echo #{q:session_path} | sed \"s|^$HOME|~|\")  #[fg=#9ece6a,bg=#24283b]#[fg=#1a1b26,bg=#9ece6a,bold]  #(cd #{q:pane_current_path} 2>/dev/null && git symbolic-ref --short HEAD 2>/dev/null || echo '—') "

# Window tabs — clickable, arrow separators on active
set -g  status-justify             left
setw -g window-status-separator    ""
setw -g window-status-style        "fg=#565f89,bg=#24283b"
setw -g window-status-format       "  #I:#W  "
setw -g window-status-current-style "fg=#1a1b26,bg=#7aa2f7,bold"
setw -g window-status-current-format \
  "#[fg=#7aa2f7,bg=#24283b]#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[fg=#7aa2f7,bg=#24283b,nobold]"

# ── Bottom strip (via pane-border-status) ─────────────────────────────────────
# Drawn at the bottom edge of each pane. With a single full-screen pane this
# acts as a screen-bottom bar; with splits, every pane gets its own bottom row.
set -g pane-border-status bottom
set -g pane-border-format ""

# ── Pane borders — colored frame around the active session ────────────────────
set -g pane-border-lines        heavy
set -g pane-border-style        "fg=#24283b"
set -g pane-active-border-style "fg=#7aa2f7"

# Prompts / messages
set -g message-style         "fg=#c0caf5,bg=#1f2335,bold"
set -g message-command-style "fg=#c0caf5,bg=#1f2335"
set -g mode-style            "fg=#1a1b26,bg=#7aa2f7"
